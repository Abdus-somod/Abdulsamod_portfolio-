<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6a4f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="360" x2="800" y2="360" stroke="#ffffff20" stroke-width="1"/>
  <line x1="0" y1="270" x2="800" y2="270" stroke="#ffffff20" stroke-width="1"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#ffffff20" stroke-width="1"/>
  <line x1="0" y1="90" x2="800" y2="90" stroke="#ffffff20" stroke-width="1"/>
  <!-- Chart line -->
  <polyline points="60,380 160,330 240,290 320,310 400,240 480,200 580,160 680,120 760,90" fill="none" stroke="#4ade80" stroke-width="3"/>
  <!-- Area fill -->
  <polygon points="60,380 160,330 240,290 320,310 400,240 480,200 580,160 680,120 760,90 760,400 60,400" fill="#4ade8020"/>
  <!-- Dots -->
  <circle cx="400" cy="240" r="6" fill="#4ade80"/>
  <circle cx="680" cy="120" r="6" fill="#4ade80"/>
  <!-- Label -->
  <text x="400" y="440" text-anchor="middle" font-family="system-ui" font-size="18" fill="#ffffffcc" font-weight="600">Equity Research Report — UPDC Plc</text>
  <text x="400" y="50" text-anchor="middle" font-family="system-ui" font-size="14" fill="#4ade80">CFA-Style Valuation Analysis</text>
</svg>
